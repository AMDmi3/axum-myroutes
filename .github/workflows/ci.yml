name: CI
on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 1"
jobs:
  test:
    strategy:
      matrix:
        include:
          - { name: "Rust 1.88",    rust: "1.94",             cargo_args: "" }
          - { name: "Rust stable",  rust: stable,             cargo_args: "" }
          - { name: "Rust nightly", rust: nightly-2026-04-06, cargo_args: "--features=nightly -- --skip ui" }
      fail-fast: false
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test ${{ matrix.cargo_args }}
      - name: Format check
        run: cargo fmt --check
      - name: Clippy check
        run: cargo clippy --all-targets
        env:
          CARGO_TARGET_DIR: target/clippy  # avoid overwriting normal build artifacts
